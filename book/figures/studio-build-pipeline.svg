<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" font-family="ui-monospace, Menlo, Monaco, monospace" font-size="12">
  <style>
    text { fill: #1f2937; }
    .title { font-size: 16px; font-weight: bold; }
    .note  { font-size: 11px; fill: #6b7280; }
    .label { font-weight: bold; }
    .step  { font-size: 11px; fill: #2563eb; }
    .cond  { font-size: 11px; fill: #7c3aed; font-weight: bold; }

    .toml    { fill: #ede9fe; stroke: #7c3aed; }
    .resolve { fill: #fef3c7; stroke: #b45309; }
    .src     { fill: #dbeafe; stroke: #2563eb; }
    .obj     { fill: #dcfce7; stroke: #16a34a; }
    .elf     { fill: #fef3c7; stroke: #b45309; }
    .bin     { fill: #fed7aa; stroke: #ea580c; }
    .uf2     { fill: #fecaca; stroke: #dc2626; }
    .chain   { fill: #fce7f3; stroke: #be185d; }

    .arrow { stroke: #374151; stroke-width: 1.5; fill: none; }

    @media (prefers-color-scheme: dark) {
      text { fill: #e5e7eb; }
      .note { fill: #9ca3af; }
      .step { fill: #93c5fd; }
      .cond { fill: #c4b5fd; }
      .toml    { fill: #3b0764; }
      .resolve { fill: #78350f; }
      .src     { fill: #1e3a8a; }
      .obj     { fill: #14532d; }
      .elf     { fill: #78350f; }
      .bin     { fill: #7c2d12; }
      .uf2     { fill: #7f1d1d; }
      .chain   { fill: #831843; }
      .arrow   { stroke: #9ca3af; }
    }
  </style>

  <text x="20" y="28" class="title">Studio build pipeline</text>
  <text x="20" y="48" class="note">Same as / ld / objcopy chain as the bare Makefile build, plus a project resolver up front and three possible UF2 outputs.</text>

  <!-- ======= Row 1: inputs to Resolve to sources ======= -->

  <rect x="20"  y="80"  width="160" height="48" class="toml" rx="6" />
  <text x="100" y="102" text-anchor="middle" class="label">project.rpasm.toml</text>
  <text x="100" y="120" text-anchor="middle" class="note">target, layout, features</text>

  <rect x="20"  y="140" width="160" height="48" class="toml" rx="6" />
  <text x="100" y="162" text-anchor="middle" class="label">catalog/*.toml</text>
  <text x="100" y="180" text-anchor="middle" class="note">targets, modules</text>

  <rect x="240" y="110" width="120" height="48" class="resolve" rx="6" />
  <text x="300" y="132" text-anchor="middle" class="label">Resolve</text>
  <text x="300" y="150" text-anchor="middle" class="note">project + catalog</text>

  <rect x="420" y="110" width="140" height="48" class="src" rx="6" />
  <text x="490" y="132" text-anchor="middle" class="label">.S sources</text>
  <text x="490" y="150" text-anchor="middle" class="note">modules + user files</text>

  <g class="arrow">
    <path d="M180,104 C210,104 210,128 238,128" />
    <path d="M180,164 C210,164 210,140 238,140" />
    <polygon points="240,128 232,124 232,132" fill="#374151" />
    <polygon points="240,140 232,136 232,144" fill="#374151" />
    <path d="M360,134 L418,134" />
    <polygon points="418,134 410,130 410,138" fill="#374151" />
  </g>

  <!-- ======= Row 2: compile chain ======= -->

  <rect x="20"  y="240" width="140" height="48" class="src" rx="6" />
  <text x="90"  y="262" text-anchor="middle" class="label">.S sources</text>
  <text x="90"  y="280" text-anchor="middle" class="note">from Resolve</text>

  <rect x="220" y="240" width="120" height="48" class="obj" rx="6" />
  <text x="280" y="262" text-anchor="middle" class="label">.o files</text>
  <text x="280" y="280" text-anchor="middle" class="note">one per source</text>

  <rect x="400" y="240" width="140" height="48" class="elf" rx="6" />
  <text x="470" y="262" text-anchor="middle" class="label">&lt;name&gt;.elf</text>
  <text x="470" y="280" text-anchor="middle" class="note">linked, relocated</text>

  <rect x="600" y="240" width="140" height="48" class="bin" rx="6" />
  <text x="670" y="262" text-anchor="middle" class="label">&lt;name&gt;.bin</text>
  <text x="670" y="280" text-anchor="middle" class="note">raw bytes</text>

  <text x="190" y="230" text-anchor="middle" class="step">as</text>
  <text x="370" y="230" text-anchor="middle" class="step">ld -T &lt;script&gt;</text>
  <text x="570" y="230" text-anchor="middle" class="step">objcopy -O binary</text>
  <text x="370" y="308" text-anchor="middle" class="note">flash.ld / sram.ld / slot-X.ld</text>

  <g class="arrow">
    <path d="M160,264 L218,264" />
    <path d="M340,264 L398,264" />
    <path d="M540,264 L598,264" />
    <polygon points="218,264 210,260 210,268" fill="#374151" />
    <polygon points="398,264 390,260 390,268" fill="#374151" />
    <polygon points="598,264 590,260 590,268" fill="#374151" />
  </g>

  <!-- Row1 sources to Row2 sources, vertical drop on the left side -->
  <g class="arrow">
    <path d="M490,158 L490,200 L90,200 L90,238" />
    <polygon points="90,240 86,232 94,232" fill="#374151" />
  </g>

  <!-- ======= Trunk: .bin to three output rows ======= -->

  <!-- L-routing: down from .bin, then left to the trunk column at x=200, then down through all three rows -->
  <g class="arrow">
    <path d="M670,288 L670,360 L200,360 L200,594" />
  </g>

  <!-- Three branches out of trunk, each pointing right into the function box -->
  <g class="arrow">
    <path d="M200,454 L238,454" />
    <polygon points="240,454 232,450 232,458" fill="#374151" />
    <path d="M200,524 L238,524" />
    <polygon points="240,524 232,520 232,528" fill="#374151" />
    <path d="M200,594 L238,594" />
    <polygon points="240,594 232,590 232,598" fill="#374151" />
  </g>

  <!-- Condition labels under each branch (above the function box label) -->
  <text x="244" y="425" class="cond">no [bootloader]</text>
  <text x="244" y="495" class="cond">[bootloader] set</text>
  <text x="244" y="565" class="cond">flash slot a|b</text>

  <!-- ======= Three output rows ======= -->

  <!-- Row A: PackUF2 to <name>.uf2 -->
  <rect x="240" y="430" width="160" height="48" class="resolve" rx="6" />
  <text x="320" y="452" text-anchor="middle" class="label">PackUF2</text>
  <text x="320" y="470" text-anchor="middle" class="note">single piece</text>

  <rect x="460" y="430" width="180" height="48" class="uf2" rx="6" />
  <text x="550" y="452" text-anchor="middle" class="label">&lt;name&gt;.uf2</text>
  <text x="550" y="470" text-anchor="middle" class="note">bare flash / sram</text>

  <!-- Row B: chain to firmware_*.uf2 -->
  <rect x="240" y="500" width="160" height="48" class="chain" rx="6" />
  <text x="320" y="522" text-anchor="middle" class="label">buildBootloaderChain</text>
  <text x="320" y="540" text-anchor="middle" class="note">SSBL+TSBL+app+footers</text>

  <rect x="460" y="500" width="200" height="48" class="uf2" rx="6" />
  <text x="560" y="522" text-anchor="middle" class="label">firmware_&lt;name&gt;.uf2</text>
  <text x="560" y="540" text-anchor="middle" class="note">full chain UF2</text>

  <!-- Row C: slot-only to slot_*_*.uf2 -->
  <rect x="240" y="570" width="160" height="48" class="chain" rx="6" />
  <text x="320" y="592" text-anchor="middle" class="label">buildSlotOnlyUF2</text>
  <text x="320" y="610" text-anchor="middle" class="note">app + footer only</text>

  <rect x="460" y="570" width="220" height="48" class="uf2" rx="6" />
  <text x="570" y="592" text-anchor="middle" class="label">slot_&lt;a|b&gt;_&lt;name&gt;.uf2</text>
  <text x="570" y="610" text-anchor="middle" class="note">A/B field update</text>

  <!-- Function-box to uf2 arrows for each row -->
  <g class="arrow">
    <path d="M400,454 L458,454" />
    <polygon points="458,454 450,450 450,458" fill="#374151" />
    <path d="M400,524 L458,524" />
    <polygon points="458,524 450,520 450,528" fill="#374151" />
    <path d="M400,594 L458,594" />
    <polygon points="458,594 450,590 450,598" fill="#374151" />
  </g>

</svg>
