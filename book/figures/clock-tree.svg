<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="ui-monospace, Menlo, Monaco, monospace" font-size="13">
  <style>
    text { fill: #1f2937; }
    .title    { font-size: 16px; font-weight: bold; }
    .small    { font-size: 11px; fill: #6b7280; }
    .label    { font-weight: bold; }
    .source   { fill: #f3f4f6; stroke: #374151; stroke-width: 1.5; }
    .pll      { fill: #fef3c7; stroke: #b45309; stroke-width: 1.5; }
    .clock    { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; }
    .div      { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.5; }
    .periph   { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .wire     { fill: none; stroke: #374151; stroke-width: 2; }
    .wirelbl  { font-size: 11px; fill: #374151; }

    @media (prefers-color-scheme: dark) {
      text { fill: #e5e7eb; }
      .small { fill: #9ca3af; }
      .wirelbl { fill: #d1d5db; }
      .wire { stroke: #d1d5db; }
      .source { fill: #1f2937; stroke: #9ca3af; }
      .pll    { fill: #78350f; stroke: #fbbf24; }
      .clock  { fill: #7f1d1d; stroke: #f87171; }
      .div    { fill: #4c1d95; stroke: #c4b5fd; }
      .periph { fill: #1e3a8a; stroke: #93c5fd; }
    }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 Z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="28" class="title">RP2350 clock tree</text>
  <text x="20" y="46" class="small">From the 12 MHz crystal through XOSC, the two PLLs, and out to every clock domain.</text>

  <!-- Source: 12 MHz crystal -->
  <g transform="translate(20,80)">
    <rect class="source" x="0" y="0" width="120" height="50" rx="6"/>
    <text x="60" y="22" text-anchor="middle" class="label">12 MHz crystal</text>
    <text x="60" y="40" text-anchor="middle" class="small">off-chip</text>
  </g>

  <!-- Wire: crystal -> XOSC -->
  <line class="wire" x1="140" y1="105" x2="180" y2="105" marker-end="url(#arrowhead)"/>

  <!-- XOSC -->
  <g transform="translate(180,80)">
    <rect class="clock" x="0" y="0" width="90" height="50" rx="6"/>
    <text x="45" y="22" text-anchor="middle" class="label">XOSC</text>
    <text x="45" y="40" text-anchor="middle" class="small">12 MHz</text>
  </g>

  <!-- Wire: XOSC trunk going right -->
  <line class="wire" x1="270" y1="105" x2="330" y2="105"/>

  <!-- Vertical trunk down to all branches -->
  <line class="wire" x1="330" y1="105" x2="330" y2="430"/>

  <!-- Branch 1: clk_ref out (top) -->
  <line class="wire" x1="330" y1="105" x2="430" y2="105" marker-end="url(#arrowhead)"/>
  <g transform="translate(430,82)">
    <rect class="clock" x="0" y="0" width="110" height="46" rx="6"/>
    <text x="55" y="20" text-anchor="middle" class="label">clk_ref</text>
    <text x="55" y="38" text-anchor="middle" class="small">12 MHz</text>
  </g>

  <!-- Branch 2: PLL_SYS path -->
  <line class="wire" x1="330" y1="200" x2="380" y2="200" marker-end="url(#arrowhead)"/>
  <g transform="translate(380,170)">
    <rect class="pll" x="0" y="0" width="180" height="60" rx="6"/>
    <text x="90" y="22" text-anchor="middle" class="label">PLL_SYS</text>
    <text x="90" y="40" text-anchor="middle" class="small">FBDIV 125, /5, /2</text>
    <text x="90" y="54" text-anchor="middle" class="small">VCO 1500 -> 150 MHz</text>
  </g>
  <line class="wire" x1="560" y1="200" x2="600" y2="200" marker-end="url(#arrowhead)"/>
  <g transform="translate(600,170)">
    <rect class="clock" x="0" y="0" width="110" height="60" rx="6"/>
    <text x="55" y="22" text-anchor="middle" class="label">clk_sys</text>
    <text x="55" y="40" text-anchor="middle" class="small">150 MHz</text>
    <text x="55" y="55" text-anchor="middle" class="small">+ clk_peri</text>
  </g>
  <!-- clk_sys consumers -->
  <line class="wire" x1="710" y1="190" x2="755" y2="190" marker-end="url(#arrowhead)"/>
  <text x="757" y="194" class="wirelbl">M33, AHB, APB</text>
  <line class="wire" x1="710" y1="215" x2="755" y2="215" marker-end="url(#arrowhead)"/>
  <text x="757" y="219" class="wirelbl">UART, SPI, I2C</text>

  <!-- Branch 3: PLL_USB path -->
  <line class="wire" x1="330" y1="310" x2="380" y2="310" marker-end="url(#arrowhead)"/>
  <g transform="translate(380,280)">
    <rect class="pll" x="0" y="0" width="180" height="60" rx="6"/>
    <text x="90" y="22" text-anchor="middle" class="label">PLL_USB</text>
    <text x="90" y="40" text-anchor="middle" class="small">FBDIV 100, /5, /5</text>
    <text x="90" y="54" text-anchor="middle" class="small">VCO 1200 -> 48 MHz</text>
  </g>
  <line class="wire" x1="560" y1="310" x2="600" y2="310" marker-end="url(#arrowhead)"/>
  <g transform="translate(600,280)">
    <rect class="clock" x="0" y="0" width="110" height="60" rx="6"/>
    <text x="55" y="22" text-anchor="middle" class="label">48 MHz bus</text>
    <text x="55" y="42" text-anchor="middle" class="small">clk_usb / clk_adc</text>
  </g>
  <line class="wire" x1="710" y1="300" x2="755" y2="300" marker-end="url(#arrowhead)"/>
  <text x="757" y="304" class="wirelbl">USB device</text>
  <line class="wire" x1="710" y1="325" x2="755" y2="325" marker-end="url(#arrowhead)"/>
  <text x="757" y="329" class="wirelbl">ADC</text>

  <!-- Branch 4: TICK divider -->
  <line class="wire" x1="330" y1="430" x2="380" y2="430" marker-end="url(#arrowhead)"/>
  <g transform="translate(380,405)">
    <rect class="div" x="0" y="0" width="180" height="50" rx="6"/>
    <text x="90" y="22" text-anchor="middle" class="label">TICK divider</text>
    <text x="90" y="40" text-anchor="middle" class="small">/12, drives 1 MHz tick</text>
  </g>
  <line class="wire" x1="560" y1="430" x2="600" y2="430" marker-end="url(#arrowhead)"/>
  <g transform="translate(600,405)">
    <rect class="periph" x="0" y="0" width="110" height="50" rx="6"/>
    <text x="55" y="22" text-anchor="middle" class="label">TIMER0/1</text>
    <text x="55" y="40" text-anchor="middle" class="small">+ WATCHDOG</text>
  </g>
  <text x="755" y="434" class="wirelbl">1 us resolution</text>

  <!-- Legend / footnote -->
  <text x="20" y="500" class="small">Source: yellow = PLL multiplier, red = clock-domain output, purple = divider, blue = peripheral consumer.</text>
</svg>
